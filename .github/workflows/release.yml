name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ------------------------------------------------------------------
  # 1. Run tests before anything else
  # ------------------------------------------------------------------
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: pytest --tb=short -q

  # ------------------------------------------------------------------
  # 2. Publish to PyPI
  # ------------------------------------------------------------------
  pypi:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
        # If PYPI_API_TOKEN is not set, this step fails gracefully
        continue-on-error: true

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/

  # ------------------------------------------------------------------
  # 3. Windows PyInstaller binary
  # ------------------------------------------------------------------
  windows-binary:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[windows,ocr,notifications]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller show_tracker.spec

      - name: Verify binary
        run: dist\show-tracker\show-tracker.exe --version

      - name: Create ZIP
        run: Compress-Archive -Path dist\show-tracker -DestinationPath dist\show-tracker-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/show-tracker-windows-x86_64.zip

  # ------------------------------------------------------------------
  # 4. Linux AppImage
  # ------------------------------------------------------------------
  linux-appimage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        run: |
          chmod +x scripts/build_appimage.sh
          ./scripts/build_appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/ShowTracker-x86_64.AppImage

  # ------------------------------------------------------------------
  # 5. Browser extensions
  # ------------------------------------------------------------------
  browser-extensions:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extensions
        run: |
          chmod +x scripts/package_extensions.sh
          ./scripts/package_extensions.sh

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: dist/show-tracker-chrome-*.zip

      - name: Upload Firefox extension
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: dist/show-tracker-firefox-*.zip

  # ------------------------------------------------------------------
  # 6. Create GitHub Release with all artifacts
  # ------------------------------------------------------------------
  github-release:
    needs: [pypi, windows-binary, linux-appimage, browser-extensions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: Collect release files
        run: |
          mkdir -p release-files
          # PyPI wheel + sdist
          cp release-assets/pypi-dist/*.whl release-files/ 2>/dev/null || true
          cp release-assets/pypi-dist/*.tar.gz release-files/ 2>/dev/null || true
          # Windows binary
          cp release-assets/windows-binary/*.zip release-files/ 2>/dev/null || true
          # Linux AppImage
          cp release-assets/linux-appimage/*.AppImage release-files/ 2>/dev/null || true
          # Browser extensions
          cp release-assets/chrome-extension/*.zip release-files/ 2>/dev/null || true
          cp release-assets/firefox-extension/*.zip release-files/ 2>/dev/null || true
          ls -la release-files/

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          cat > release-notes.md << 'NOTES'
          ## What's New

          See the [full changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

          ## Downloads

          | Platform | File | Description |
          |----------|------|-------------|
          | **All platforms** | `show_tracker-*-py3-none-any.whl` | Python wheel — `pip install show-tracker` |
          | **Windows** | `show-tracker-windows-x86_64.zip` | Standalone binary (no Python needed) |
          | **Linux** | `ShowTracker-x86_64.AppImage` | Portable AppImage (no install needed) |
          | **Chrome** | `show-tracker-chrome-*.zip` | Load unpacked in `chrome://extensions` |
          | **Firefox** | `show-tracker-firefox-*.zip` | Load via `about:debugging` |

          ## Install from PyPI

          ```bash
          pip install show-tracker
          ```

          ## Quick Start

          ```bash
          show-tracker setup    # First-run wizard (TMDb API key)
          show-tracker run      # Start tracking
          ```

          Open http://localhost:7600 for the dashboard.
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: release-files/*
